name: CD — Continuous Deployment
 
on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
 
# Buena práctica: evitar despliegues simultáneos a producción
concurrency:
  group: cd-production
  cancel-in-progress: false   # No cancelar deploys en curso, esperar
 
# Buena práctica: permisos mínimos — solo los necesarios para ghcr.io y deployments
permissions:
  contents: read
  packages: write
  deployments: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}
  WORKING_DIR: './app'

jobs:
 
  # ─────────────────────────────────────────────
  # JOB 1: Build & Push Docker image
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push — Docker image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
      image: ${{ steps.version.outputs.image }}
 
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Generate semantic version
        id: version
        run: |
          SHA_SHORT=$(echo $GITHUB_SHA | cut -c1-7)
          VERSION="1.${{ github.run_number }}.${SHA_SHORT}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
 
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # Buena práctica: usar el GITHUB_TOKEN automático, nunca hardcodear
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.WORKING_DIR }}
          push: true
          target: production
          tags: |
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.image }}:latest
          # Buena práctica: caché de capas Docker con GitHub Actions cache
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
 
      - name: Generate job summary
        run: |
          echo "## 🐳 Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Latest tag** | \`${{ steps.version.outputs.image }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ steps.docker-build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY