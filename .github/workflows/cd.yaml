name: CD — Continuous Deployment
 
on:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'app/**'
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      version:
        required: true
        type: string
 
# Buena práctica: evitar despliegues simultáneos a producción
concurrency:
  group: cd-production
  cancel-in-progress: false   # No cancelar deploys en curso, esperar
 
# Buena práctica: permisos mínimos — solo los necesarios para ghcr.io y deployments
permissions:
  contents: read
  packages: write
  deployments: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}
  WORKING_DIR: './app'

jobs:

   
  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Staging preproducción
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy — Staging environment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-push
 
    # Buena práctica: usar GitHub Environments para trazabilidad y protección
    environment:
      name: staging
      url: https://staging.devops-app.example.com
 
    steps:
      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to STAGING"
          echo "   Image: ${{ inputs.image }}:${{ inputs.version }}"
          echo "   Environment: staging"
          echo "   Deployed by: ${{ github.actor }}"
          # En un caso real, aquí iría: kubectl set image, helm upgrade, etc.
 
      - name: Run smoke tests
        run: |
          echo "🔥 Running smoke tests against staging..."
          echo "   GET /health → 200 OK ✓"
          echo "   GET /api/items → 200 OK ✓"
          echo "Smoke tests passed ✓"
          # En un caso real: curl, newman, etc.
 
      - name: Notify staging deployment
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Staging deployment succeeded: ${{ inputs.version }}"
          else
            echo "❌ Staging deployment failed"
          fi
  
  # ─────────────────────────────────────────────
  # JOB 3: Deploy to Production (con aprobación manual)
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy — Production environment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build-and-push
      - deploy-staging
 
    # Buena práctica: environment con required reviewers configurado en GitHub
    # (Settings → Environments → production → Required reviewers)
    environment:
      name: production
      url: https://devops-app.example.com
 
    steps:
      - name: Deploy to production
        run: |
          echo "🚀 Deploying to PRODUCTION"
          echo "   Image: ${{ inputs.image }}:${{ inputs.version }}"
          echo "   Environment: production"
          echo "   Approved and deployed by: ${{ github.actor }}"
          # En un caso real aquí iría el despliegue real
 
      - name: Verify production health
        run: |
          echo "🏥 Checking production health..."
          echo "   GET https://devops-app.example.com/health → 200 OK ✓"
          echo "Production deployment verified ✓"
 
      - name: Generate production summary
        run: |
          echo "## 🎉 Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** \`${{ inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://devops-app.example.com" >> $GITHUB_STEP_SUMMARY