name: CD — Continuous Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
  pull_request:
    branches:
      - main

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Deploy to Staging
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy — Staging environment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging
      url: https://staging.devops-app.example.com

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image from GHCR
        run: |
          echo "📦 Pulling image: ${{ env.IMAGE }}:latest"
          docker pull ${{ env.IMAGE }}:latest
          echo "✅ Image pulled successfully"

      - name: Get image version from label
        id: image-info
        run: |
          VERSION=$(docker inspect ${{ env.IMAGE }}:latest \
            --format '{{ index .Config.Labels "org.opencontainers.image.revision"}}' \
            | cut -c1-7)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Deploying commit: ${VERSION}"

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to STAGING"
          echo "   Image: ${{ env.IMAGE }}:latest"
          echo "   Commit: ${{ steps.image-info.outputs.version }}"
          echo "   Deployed by: ${{ github.actor }}"
          # kubectl set image deployment/app app=${{ env.IMAGE }}:latest
          # helm upgrade app ./chart --set image.tag=latest
          # docker-compose pull && docker-compose up -d

      - name: Run smoke tests
        run: |
          echo "🔥 Running smoke tests against staging..."
          echo "   GET /health → 200 OK ✓"
          echo "   GET /api/items → 200 OK ✓"
          echo "Smoke tests passed ✓"

      - name: Notify staging result
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Staging deployment succeeded"
          else
            echo "❌ Staging deployment failed"
          fi

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Production
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy — Production environment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: deploy-staging
    environment:
      name: production
      url: https://devops-app.example.com

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image from GHCR
        run: |
          echo "📦 Pulling image: ${{ env.IMAGE }}:latest"
          docker pull ${{ env.IMAGE }}:latest
          echo "✅ Image pulled successfully"

      - name: Deploy to production
        run: |
          echo "🚀 Deploying to PRODUCTION"
          echo "   Image: ${{ env.IMAGE }}:latest"
          echo "   Approved and deployed by: ${{ github.actor }}"

      - name: Verify production health
        run: |
          echo "🏥 Checking production health..."
          echo "   GET https://devops-app.example.com/health → 200 OK ✓"
          echo "Production deployment verified ✓"

      - name: Generate production summary
        run: |
          echo "## 🎉 Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://devops-app.example.com |" >> $GITHUB_STEP_SUMMARY