name: CI — Continuous Integration
 
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop
 
# Buena práctica: cancelar runs anteriores del mismo PR o rama
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
 
# Buena práctica: permisos mínimos a nivel de workflow
permissions:
  contents: read

# Buena práctica: centralizar valores reutilizables
env:
  NODE_VERSION_DEFAULT: '20'
  WORKING_DIR: './app'
 
jobs:
 
  # ─────────────────────────────────────────────
  # JOB 1: Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint — ESLint code analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js ${{ env.NODE_VERSION_DEFAULT }}
        uses: actions/setup-node@v4
        # with:
        #   node-version: ${{ env.NODE_VERSION_DEFAULT }}
        #   cache: 'npm'
        #   cache-dependency-path: 'app/package-lock.json'
 
      - name: Install dependencies
        run: npm ci
 
      - name: Run ESLint
        run: npm run lint