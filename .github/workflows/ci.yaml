name: CI — Continuous Integration
 
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop
 
# Buena práctica: cancelar runs anteriores del mismo PR o rama
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
 
# Buena práctica: permisos mínimos a nivel de workflow
permissions:
  contents: read

# Buena práctica: centralizar valores reutilizables
env:
  NODE_VERSION_DEFAULT: '20'
  WORKING_DIR: './app'
 
jobs:
 
  # ─────────────────────────────────────────────
  # JOB 1: Lint -> Analiza el codigo buscando errores
  # ─────────────────────────────────────────────
  lint:
    name: Lint — ESLint code analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10 #Lo mata a los 10 minutos asi se evita un bloqueo
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js ${{ env.NODE_VERSION_DEFAULT }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'
 
      - name: Install dependencies
        run: npm ci
 
      - name: Run ESLint
        run: npm run lint

    # ─────────────────────────────────────────────
    # JOB 2: Security Audit (paralelo con lint) -> Busca vulnerabilidades
    # ─────────────────────────────────────────────
  security:
      name: Security — npm audit
      runs-on: ubuntu-latest
      timeout-minutes: 10
      defaults:
        run:
          working-directory: ${{ env.WORKING_DIR }}
  
      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
  
        - name: Setup Node.js ${{ env.NODE_VERSION_DEFAULT }}
          uses: actions/setup-node@v4
          with:
            node-version: ${{ env.NODE_VERSION_DEFAULT }}
            cache: 'npm'
            cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
  
        - name: Install dependencies
          run: npm ci
  
        - name: Run security audit
          run: npm audit --audit-level=high
      
    # ─────────────────────────────────────────────
    # JOB 3: Test (matrix, depende de lint)  -> se ejecutan los test en varias versiones 
    # ─────────────────────────────────────────────
  test:
    name: Test — Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    defaults:
      run:
          
        working-directory: ${{ env.WORKING_DIR }}
  
    strategy:
      fail-fast: false # hace que aunque uno falle los demas sigan ejecutandose
      matrix:          
      node-version: ['18', '20', '22']
  
    steps:
        - name: Checkout repository
          uses: actions/checkout@v4
  
        - name: Setup Node.js ${{ matrix.node-version }}
          uses: actions/setup-node@v4
          with:
            node-version: ${{ matrix.node-version }}
            cache: 'npm'
            cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
  
        - name: Install dependencies
          run: npm ci
  
        - name: Run tests with coverage
          run: npm run test:ci
  
        - name: Upload coverage artifact
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: coverage-node-${{ matrix.node-version }}
            path: ${{ env.WORKING_DIR }}/coverage/
            retention-days: 7

    # ─────────────────────────────────────────────
    # JOB 1: Build & Push Docker image
    # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push — Docker image to GHCR
    runs-on: ubuntu-latest
    needs: [test, security]
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
      image: ${{ steps.version.outputs.image }}
  
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
    # ─────────────────────────────────────────────
    # JOB 4: Build check (depende de test y security)
    # ─────────────────────────────────────────────
      - name: Generate semantic version
        id: version
        run: |
            SHA_SHORT=$(echo $GITHUB_SHA | cut -c1-7)
            VERSION="1.${{ github.run_number }}.${SHA_SHORT}"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "image=${IMAGE}" >> $GITHUB_OUTPUT
            echo "Generated version: ${VERSION}"
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
  
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # Buena práctica: usar el GITHUB_TOKEN automático, nunca hardcodear
          password: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.WORKING_DIR }}
          push: true
          target: production
          tags: |
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.image }}:latest
            # Buena práctica: caché de capas Docker con GitHub Actions cache
            # cache-from: type=gha
            # cache-to: type=gha,mode=max
          labels: |
              org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
              org.opencontainers.image.revision=${{ github.sha }}
              org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
  
      - name: Generate job summary
        run: |
            echo "## 🐳 Docker Image Published" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Version** | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Image** | \`${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Latest tag** | \`${{ steps.version.outputs.image }}:latest\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Digest** | \`${{ steps.docker-build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Actor** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  cd:
    needs: build-and-push
    uses: claudiatn/pipeline-lab/.github/workflows/cd.yaml@main
    with:
      image: ${{ needs.build-and-push.outputs.image }}
      version: ${{ needs.build-and-push.outputs.version }}
    secrets: inherit 

