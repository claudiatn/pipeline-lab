name: CI — Continuous Integration
 
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop
 
# Buena práctica: cancelar runs anteriores del mismo PR o rama
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
 
# Buena práctica: permisos mínimos a nivel de workflow
permissions:
  contents: read

# Buena práctica: centralizar valores reutilizables
env:
  NODE_VERSION_DEFAULT: '20'
  WORKING_DIR: './app'
 
jobs:
 
  # ─────────────────────────────────────────────
  # JOB 1: Lint -> Analiza el codigo buscando errores
  # ─────────────────────────────────────────────
  lint:
    name: Lint — ESLint code analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10 #Lo mata a los 10 minutos asi se evita un bloqueo
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js ${{ env.NODE_VERSION_DEFAULT }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'
 
      - name: Install dependencies
        run: npm ci
 
      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────────
  # JOB 2: Security Audit (paralelo con lint) -> Busca vulnerabilidades
  # ─────────────────────────────────────────────
  security:
    name: Security — npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js ${{ env.NODE_VERSION_DEFAULT }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
 
      - name: Install dependencies
        run: npm ci
 
      - name: Run security audit
        run: npm audit --audit-level=high
    
  # ─────────────────────────────────────────────
  # JOB 3: Test (matrix, depende de lint)  -> se ejecutan los test en varias versiones 
  # ─────────────────────────────────────────────
  test:
    name: Test — Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
 
    strategy:
      fail-fast: false # hace que aunque uno falle los demas sigan ejecutandose
      matrix:
        node-version: ['18', '20', '22']
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
 
      - name: Install dependencies
        run: npm ci
 
      - name: Run tests with coverage
        run: npm run test:ci
 
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: ${{ env.WORKING_DIR }}/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 4: Build check (depende de test y security)
  # ─────────────────────────────────────────────
  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: 
    - test
    - security
    defaults:
      run:
        working-directory: ${{env.WORKING_DIR}}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Set up Docker Buildx
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.WORKING_DIR }}
          push: false
          tags: devops-app:ci-check
          target: production
      
      - name: Verify image was built
        run: echo "Docker image built successfully — ready for deployment pipeline"
      

